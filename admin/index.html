    <!-- Google Search Console OAuth Intercept (Shields Supabase PKCE Auth) -->
    <script>
      try {
        if (window.location.pathname.replace(/\/$/, '') === '/admin/seo-obsah' && window.location.search.includes('code=')) {
          var params = new URLSearchParams(window.location.search);
          var code = params.get('code');
          var state = params.get('state');
          if (code) {
            sessionStorage.setItem('gsc_oauth_code', code);
            if (state) sessionStorage.setItem('gsc_oauth_state', state);
            window.history.replaceState({}, '', '/admin/seo-obsah?gsc_callback=1');
          }
        }
      } catch (e) {}
    </script>

    <!-- Google Consent Mode v2 — MUST be before GTM -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('consent', 'default', {
        'analytics_storage': 'denied',
        'ad_storage': 'denied',
        'ad_user_data': 'denied',
        'ad_personalization': 'denied',
        'functionality_storage': 'granted',
        'security_storage': 'granted',
        'wait_for_update': 500
      });
      // Restore previous consent from localStorage for returning users
      try {
        var c = JSON.parse(localStorage.getItem('zrobee_cookie_consent'));
        if (c && c.version === '1.1') {
          gtag('consent', 'update', {
            'analytics_storage': c.analytics ? 'granted' : 'denied',
            'ad_storage': c.marketing ? 'granted' : 'denied',
            'ad_user_data': c.marketing ? 'granted' : 'denied',
            'ad_personalization': c.marketing ? 'granted' : 'denied'
          });
        }
      } catch(e){}

      // UTM Persistence — capture BEFORE any redirect or React boot
      try {
        var sp = new URLSearchParams(window.location.search);
        var us = sp.get('utm_source');
        var um = sp.get('utm_medium');
        var uc = sp.get('utm_campaign');
        if (us) sessionStorage.setItem('utm_source', us);
        if (um) sessionStorage.setItem('utm_medium', um);
        if (uc) sessionStorage.setItem('utm_campaign', uc);
      } catch(e){
        console.warn('[UTM] Storage blocked:', e);
      }
    </script>

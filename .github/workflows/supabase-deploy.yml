name: Deploy Supabase Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/supabase-deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Database Migrations
        run: |
          supabase link --project-ref $PROJECT_ID --password $SUPABASE_DB_PASSWORD
          supabase db push --include-all
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Deploy autonomous-web-sniper
        run: supabase functions deploy autonomous-web-sniper --project-ref $PROJECT_ID
        
      - name: Deploy upload-contact
        run: supabase functions deploy upload-contact --project-ref $PROJECT_ID

      - name: Deploy campaign-batcher
        run: supabase functions deploy campaign-batcher --project-ref $PROJECT_ID

      - name: Deploy send-template-test
        run: supabase functions deploy send-template-test --project-ref $PROJECT_ID

      - name: Deploy process-sniper-outbox
        run: supabase functions deploy process-sniper-outbox --project-ref $PROJECT_ID

      - name: Deploy email-reply-webhook
        run: supabase functions deploy email-reply-webhook --project-ref $PROJECT_ID

      - name: Deploy admin-send-broadcast-email
        run: supabase functions deploy admin-send-broadcast-email --project-ref $PROJECT_ID

<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="card.css">
</head>
<body>
<div class="card">
  <div class="col" style="gap:24px;">
    <div class="col" style="gap:10px;">
      <hr style="border:0; height:1px; background:var(--line); margin:0;">
      <span class="label">Horizon — black 10% — major divider</span>
    </div>
    <div class="col" style="gap:10px;">
      <hr style="border:0; height:1px; background:var(--line-strong); margin:0;">
      <span class="label">Emphasis — black 24%</span>
    </div>
    <div class="col" style="gap:10px;">
      <hr style="border:0; height:1px; background:var(--line-ink); margin:0;">
      <span class="label">Full rule — pure ink</span>
    </div>
  </div>
</div>
</body>
</html>

<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="card.css">
</head>
<body>
<div class="card">
  <div class="row" style="gap:0; border:1px solid var(--line);">
    <div style="flex:1; height:110px; background:#0A0A0A;"></div>
    <div style="flex:1; height:110px; background:#404040;"></div>
    <div style="flex:1; height:110px; background:#737373;"></div>
    <div style="flex:1; height:110px; background:#A3A3A3;"></div>
    <div style="flex:1; height:110px; background:#D4D4D4;"></div>
    <div style="flex:1; height:110px; background:#E5E4DF;"></div>
  </div>
  <div class="row" style="gap:0; margin-top:10px;">
    <span class="label" style="flex:1;">900</span>
    <span class="label" style="flex:1;">700</span>
    <span class="label" style="flex:1;">500</span>
    <span class="label" style="flex:1;">400</span>
    <span class="label" style="flex:1;">300</span>
    <span class="label" style="flex:1;">200</span>
  </div>
</div>
</body>
</html>

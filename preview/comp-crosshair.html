<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="card.css">
<style>
  .vf { position:relative; height:200px; overflow:hidden; background:#000; }
  .vf img { width:100%; height:100%; object-fit:cover; filter:grayscale(1) contrast(1.05); display:block; }
  .vf .ov { position:absolute; inset:0; }
  .tick { position:absolute; }
  .tick::before, .tick::after { content:""; position:absolute; background:var(--canvas); }
  .tick.tl { top:12px; left:12px; }
  .tick.tr { top:12px; right:12px; }
  .tick.bl { bottom:12px; left:12px; }
  .tick.br { bottom:12px; right:12px; }
  .tick::before { width:16px; height:1px; }
  .tick::after  { width:1px; height:16px; }
  .tick.tr::before, .tick.br::before { right:0; }
  .tick.tr::after,  .tick.tr::before { right:0; }
  .tick.bl::before, .tick.bl::after { bottom:0; }
  .tick.br::before, .tick.br::after { right:0; bottom:0; }
  .cross { position:absolute; top:50%; left:50%; width:22px; height:22px; transform:translate(-50%,-50%); }
  .cross::before,.cross::after { content:""; position:absolute; background:var(--canvas); }
  .cross::before { top:50%; left:0; width:100%; height:1px; }
  .cross::after { left:50%; top:0; height:100%; width:1px; }
  .meta { position:absolute; font-family:var(--font-mono); font-size:9px; letter-spacing:0.2em; color:var(--canvas); text-transform:uppercase; }
</style>
</head>
<body>
<div class="card" style="padding:0;">
  <div class="vf">
    <img src="https://picsum.photos/seed/atmosferi-ridge/700/300" alt="">
    <div class="ov">
      <span class="tick tl"></span><span class="tick tr"></span>
      <span class="tick bl"></span><span class="tick br"></span>
      <span class="cross"></span>
      <span class="meta" style="top:14px; left:34px;">● REC</span>
      <span class="meta" style="bottom:14px; left:34px;">N 45°27′ E 09°11′</span>
      <span class="meta" style="bottom:14px; right:34px;">F2.8 · 1/250</span>
    </div>
  </div>
</div>
</body>
</html>

<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="card.css">
</head>
<body>
<div class="card row" style="gap:20px; align-items:stretch;">
  <div class="col between" style="flex:1; border:1px solid var(--line-ink); padding:18px; height:130px;">
    <span class="label" style="color:var(--ink);">Radius — 0px</span>
    <span style="font-size:26px; font-weight:600; letter-spacing:-0.02em;">Sharp.</span>
  </div>
  <div class="col between" style="flex:1; border:1px solid var(--line-ink); padding:18px; height:130px; position:relative;">
    <span class="label" style="color:var(--ink);">Shadow — none</span>
    <span style="font-size:26px; font-weight:600; letter-spacing:-0.02em;">Flat.</span>
    <span style="position:absolute; top:14px; right:16px; font-family:var(--font-mono); font-size:22px; color:var(--neutral-400);">⊘</span>
  </div>
</div>
</body>
</html>

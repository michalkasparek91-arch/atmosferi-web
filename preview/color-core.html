<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="card.css">
</head>
<body>
<div class="card">
  <div class="row" style="gap:0; border:1px solid var(--line-ink);">
    <div style="flex:1; height:150px; background:var(--canvas); display:flex; flex-direction:column; justify-content:space-between; padding:16px; border-right:1px solid var(--line-ink);">
      <span class="label">Canvas / Off-White</span>
      <span class="label" style="color:var(--ink);">#F2F1EC</span>
    </div>
    <div style="flex:1; height:150px; background:var(--ink); display:flex; flex-direction:column; justify-content:space-between; padding:16px;">
      <span class="label" style="color:#F2F1EC;">Ink / Pure Black</span>
      <span class="label" style="color:#F2F1EC;">#000000</span>
    </div>
  </div>
</div>
</body>
</html>

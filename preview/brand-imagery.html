<!-- @dsCard group="Brand" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="card.css">
<style>
  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--line-ink); border:1px solid var(--line-ink); }
  .grid figure { margin:0; height:120px; overflow:hidden; background:#000; }
  .grid img { width:100%; height:100%; object-fit:cover; filter:grayscale(1) contrast(1.05) brightness(1.02); display:block; }
</style>
</head>
<body>
<div class="card" style="padding:0;">
  <div class="grid">
    <figure><img src="https://picsum.photos/seed/atm-a/300/240" alt=""></figure>
    <figure><img src="https://picsum.photos/seed/atm-b/300/240" alt=""></figure>
    <figure><img src="https://picsum.photos/seed/atm-c/300/240" alt=""></figure>
  </div>
</div>
</body>
</html>

<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="card.css">
</head>
<body>
<div class="card row" style="gap:0; border:1px solid var(--line);">
  <div class="col" style="flex:1; gap:12px; padding:20px; border-right:1px solid var(--line);">
    <span class="label">Geist — Sans</span>
    <div style="font-size:34px; letter-spacing:-0.02em; line-height:1;">
      <div style="font-weight:300;">Light</div>
      <div style="font-weight:500;">Medium</div>
      <div style="font-weight:700;">Bold</div>
    </div>
  </div>
  <div class="col" style="flex:1; gap:12px; padding:20px;">
    <span class="label">Geist Mono</span>
    <div style="font-family:var(--font-mono); font-size:24px; line-height:1.25;">
      <div>0123456789</div>
      <div>{ }&nbsp;( )&nbsp;&lt; /&gt;</div>
      <div style="font-size:13px; color:var(--neutral-500);">monospace · code</div>
    </div>
  </div>
</div>
</body>
</html>
